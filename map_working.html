<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Relocation Mapper</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="cities.js"></script>
<style>
body { margin: 0; padding: 0; }
#map { height: 100vh; width: 100%; }
#panel {
    position: absolute;
    top: 20px;
    right: 20px;
    background: white;
    padding: 15px;
    border-radius: 8px;
    z-index: 1000;
    width: 280px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}
select, button { width: 100%; padding: 8px; margin-top: 5px; }
.legend { margin-top: 15px; padding-top: 10px; border-top: 1px solid #ccc; }
.legend div { margin: 5px 0; }
.legend span { display: inline-block; width: 20px; height: 20px; margin-right: 8px; vertical-align: middle; }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
    <h3>Relocation Mapper</h3>
    <label>Planet A</label>
    <select id="planetA">
        <option value="sun">Sun</option><option value="moon">Moon</option>
        <option value="mercury">Mercury</option><option value="venus">Venus</option>
        <option value="mars">Mars</option>
        <option value="jupiter">Jupiter</option><option value="saturn">Saturn</option>
        <option value="uranus">Uranus</option><option value="neptune">Neptune</option>
        <option value="pluto">Pluto</option>
    </select>
    <select id="houseA">
        <option>1</option><option>2</option><option>3</option><option>4</option>
        <option>5</option><option>6</option><option>7</option><option>8</option>
        <option>9</option><option>10</option><option>11</option><option>12</option>
    </select>
    
    <label>Planet B (optional)</label>
    <select id="planetB"><option value="">NONE</option>
        <option value="sun">Sun</option><option value="moon">Moon</option>
        <option value="mercury">Mercury</option><option value="venus">Venus</option>
        <option value="mars">Mars</option>
        <option value="jupiter">Jupiter</option><option value="saturn">Saturn</option>
        <option value="uranus">Uranus</option><option value="neptune">Neptune</option>
        <option value="pluto">Pluto</option>
    </select>
    <select id="houseB">
        <option>1</option><option>2</option><option>3</option><option>4</option>
        <option>5</option><option>6</option><option>7</option><option>8</option>
        <option>9</option><option>10</option><option>11</option><option>12</option>
    </select>
    
    <label>Planet C (optional)</label>
    <select id="planetC"><option value="">NONE</option>
        <option value="sun">Sun</option><option value="moon">Moon</option>
        <option value="mercury">Mercury</option><option value="venus">Venus</option>
        <option value="mars">Mars</option>
        <option value="jupiter">Jupiter</option><option value="saturn">Saturn</option>
        <option value="uranus">Uranus</option><option value="neptune">Neptune</option>
        <option value="pluto">Pluto</option>
    </select>
    <select id="houseC">
        <option>1</option><option>2</option><option>3</option><option>4</option>
        <option>5</option><option>6</option><option>7</option><option>8</option>
        <option>9</option><option>10</option><option>11</option><option>12</option>
    </select>
    
    <button id="findBtn">🔍 Find Regions</button>
    
    <div class="legend">
        <div><span style="background:#f1c40f"></span>A only</div>
        <div><span style="background:#ff4d6d"></span>B only</div>
        <div><span style="background:#3b82f6"></span>C only</div>
    </div>
</div>

<script>
const map = L.map('map').setView([20, 0], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let regionLayer = null;
let cityLayer = L.layerGroup().addTo(map);
const colors = ["#f1c40f", "#ff4d6d", "#3b82f6"];

function renderCities() {
    cityLayer.clearLayers();
    if (!citiesData || citiesData.length === 0) return;
    
    const zoom = map.getZoom();
    const bounds = map.getBounds();
    
    let minPop = 0;
    if (zoom <= 3) minPop = 5000000;
    else if (zoom <= 4) minPop = 2000000;
    else if (zoom <= 5) minPop = 1000000;
    else if (zoom <= 6) minPop = 500000;
    else if (zoom <= 7) minPop = 100000;
    else if (zoom <= 8) minPop = 50000;
    else minPop = 0;
    
    citiesData.forEach(city => {
        if (city.pop >= minPop && bounds.contains([city.lat, city.lng])) {
            L.circleMarker([city.lat, city.lng], {
                radius: zoom >= 7 ? 5 : 3,
                color: "#222",
                fillColor: "#fff",
                fillOpacity: 1,
                weight: 1.5
            }).addTo(cityLayer).bindPopup(`<b>${city.name}, ${city.country}</b><br>${city.lat.toFixed(2)}°, ${city.lng.toFixed(2)}°`);
        }
    });
}

async function findRegions() {
    if (regionLayer) map.removeLayer(regionLayer);
    
    const conditions = [];
    conditions.push({planet: document.getElementById("planetA").value, house: parseInt(document.getElementById("houseA").value)});
    const planetB = document.getElementById("planetB").value;
    if (planetB) conditions.push({planet: planetB, house: parseInt(document.getElementById("houseB").value)});
    const planetC = document.getElementById("planetC").value;
    if (planetC) conditions.push({planet: planetC, house: parseInt(document.getElementById("houseC").value)});
    
    const response = await fetch("http://127.0.0.1:8000/search-regions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            birth_year: 1976, birth_month: 1, birth_day: 13, birth_hour_utc: 12.78333,
            house_conditions: conditions, resolution: 0.5
        })
    });
    
    const data = await response.json();
    regionLayer = L.geoJSON(data, {
        style: function(feature) {
            let idx = feature.properties.condition_index || 0;
            return { color: colors[idx], fillColor: colors[idx], fillOpacity: 0.35, weight: 0 };
        }
    }).addTo(map);
    regionLayer.bringToFront();
    renderCities();
}

document.getElementById("findBtn").onclick = findRegions;
map.on("zoomend moveend", renderCities);

// Load cities from dataset
loadCitiesDataset();
</script>
</body>
</html>
