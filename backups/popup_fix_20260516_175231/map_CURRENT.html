<!DOCTYPE html>
<html>

<meta charset="utf-8" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {

}

#app {

}

    display: inline-block;

    height: 20px;
    margin-right: 8px;
    vertical-align: middle;
}
.leaflet-popup-content-wrapper {
    max-height: 420px;
    overflow-y: auto;
}
</style>
</head>
<body>

<div id="app">

    <div id="panel">

<select id="chartProfile">

</select>

<br><br>

        <select id="planetC">

            <option value="sun">Sun</option>

            <option value="mercury">Mercury</option>
            <option value="venus">Venus</option>
            <option value="mars">Mars</option>
            <option value="jupiter">Jupiter</option>

            <option>5</option><option>6</option><option>7</option><option>8</option>

            <option value="venus">Venus</option>
            <option value="mars">Mars</option>
            <option value="jupiter">Jupiter</option>
            <option value="saturn">Saturn</option>

        </select>

        <button id="findBtn">🔍 Find Regions</button>

        <div class="legend">
            <div><span style="background:#f1c40f"></span>A only</div>
            <div><span style="background:#ff4d6d"></span>B only</div>

        </div>
    </div>
</div>

<script>
async function loadChartProfiles() {

    const response = await fetch(
        "http://127.0.0.1:8000/chart-profiles"
    );

    const profiles = await response.json();

    const select = document.getElementById("chartProfile");

    select.innerHTML = "";

    profiles.forEach(profile => {

        const option = document.createElement("option");

        option.value = profile.id;

        option.textContent = profile.name;

        option.dataset.profile = JSON.stringify(profile);

        select.appendChild(option);

    });
}

loadChartProfiles();
const map = L.map('map', {
    doubleClickZoom: false
}).setView([20, 0], 2);

map.setMaxBounds([
    [-85, -180],
    [85, 180]
]);

setTimeout(() => {
    map.invalidateSize();

}, 100);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    noWrap: true,
    bounds: [[-85, -180], [85, 180]]
}).addTo(map);

map.getContainer().addEventListener("contextmenu", async function(ev) {
    ev.preventDefault();

   

    map.closePopup();

    const e = {
        latlng: map.mouseEventToLatLng(ev)
    };

    const lat = e.latlng.lat;
    const lon = e.latlng.lng;
    if (Math.abs(lat) > 65) {
    L.popup({
        maxWidth: 260,
        autoPan: true,
        keepInView: true
    })
    .setLatLng(e.latlng)
    .setContent(`
        <b>Outside reliable chart zone</b><br>
        Lat: ${lat.toFixed(4)}<br>
        Lon: ${lon.toFixed(4)}<br><br>
        Placidus relocation charts are capped at ±65° for now.
    `)
    .openOn(map);
    return;
}
   const selectedOption =
    document.getElementById("chartProfile").selectedOptions[0];

const profile =
    JSON.parse(selectedOption.dataset.profile);

const [year, month, day] =
    profile.date.split("-").map(Number);

const [hour, minute] =
    profile.time.split(":").map(Number);

const birthHourUTC =
    hour + (minute / 60);

const response = await fetch(
    `http://127.0.0.1:8000/relocated-chart?lat=${lat}&lon=${lon}&birth_year=${year}&birth_month=${month}&birth_day=${day}&birth_hour_utc=${birthHourUTC}`
);
const data = await response.json();
console.log("RELOCATED DATA", data);
console.log("Planet houses:", data.planet_houses);
console.log("Planet houses entries:", Object.entries(data.planet_houses || {}));

const planetHouseHtml = data.planet_houses
    ? Object.entries(data.planet_houses)
        .map(([planet, info]) => {
            return `<b>${planet}:</b> House ${info.house} — ${info.longitude_formatted}`;
        })
        .join("<br>")
    : "No planet house data returned.";

const containerPoint = map.latLngToContainerPoint(e.latlng);
const popupOffsetY = containerPoint.y < 260 ? 220 : 20;

L.popup({
    maxWidth: 280,
    maxHeight: 360,
    autoPan: false,
    keepInView: false,
    offset: [0, popupOffsetY]
})
    .setLatLng(e.latlng)
    .setContent(`
        <div style="font-size:14px; line-height:1.35; max-height:340px; overflow-y:auto;">
            <b>Custom Location</b><br>

            Lat: ${lat.toFixed(4)}<br>
            Lon: ${lon.toFixed(4)}<br><br>

            <b>ASC:</b> ${data.asc}<br>
            <span style="color:#666;">
                ${data.asc_deg.toFixed(2)}°
            </span><br><br>

            <b>MC:</b> ${data.mc}<br>
            <span style="color:#666;">
                ${data.mc_deg.toFixed(2)}°
            </span><br><br>

            <b>DESC:</b> ${data.desc}<br>
            <span style="color:#666;">
                ${data.desc_deg.toFixed(2)}°
            </span><br><br>

                        <b>IC:</b> ${data.ic}<br>
            <span style="color:#666;">
                ${data.ic_deg.toFixed(2)}°
            </span><br><br>

 <hr>
<b>Planet Houses</b><br>
${planetHouseHtml}
        </div>
    `)
    .openOn(map);
});



let cityLayer = L.layerGroup().addTo(map);
let polygonLayer = L.layerGroup().addTo(map);
let aspectLayer = L.layerGroup().addTo(map);

let currentRenderToken = 0;
let debounceTimer = null;
const colors = ["#f1c40f", "#ff4d6d", "#3b82f6"];

function renderCities() {
    cityLayer.clearLayers();
    if (!citiesData || citiesData.length === 0) return;

    const zoom = map.getZoom();
    const bounds = map.getBounds();

    let minPop = 0;
    if (zoom <= 3) minPop = 5000000;
    else if (zoom <= 4) minPop = 2000000;
    else if (zoom <= 5) minPop = 1000000;
    else if (zoom <= 6) minPop = 500000;
    else if (zoom <= 7) minPop = 100000;
    else if (zoom <= 8) minPop = 50000;
    else minPop = 0;

    citiesData.forEach(city => {
        if (city.pop >= minPop && bounds.contains([city.lat, city.lng])) {
            L.circleMarker([city.lat, city.lng], {
                radius: zoom >= 7 ? 5 : 3,
                color: "#222",
                fillColor: "#fff",
                fillOpacity: 1,
                weight: 1.5
            }).addTo(cityLayer).bindPopup(
                `<b>${city.name}, ${city.country}</b><br>${city.lat.toFixed(2)}°, ${city.lng.toFixed(2)}°`
            );
        }
    });
}

async function findRegions() {
    document.getElementById("findBtn").disabled = true;

    try {
        const token = ++currentRenderToken;
        console.log("START RENDER", token);

        polygonLayer.clearLayers();
        aspectLayer.clearLayers();

        const selectedOption =
            document.getElementById("chartProfile").selectedOptions[0];

        const profile =
            JSON.parse(selectedOption.dataset.profile);

        const [year, month, day] =
            profile.date.split("-").map(Number);

        const [hour, minute] =
            profile.time.split(":").map(Number);

        const birthHourUTC =
            hour + (minute / 60);

        const conditions = [];

        conditions.push({
            planet: document.getElementById("planetA").value,
            house: parseInt(document.getElementById("houseA").value)
        });

        const planetB = document.getElementById("planetB").value;
        if (planetB) {
            conditions.push({
                planet: planetB,
                house: parseInt(document.getElementById("houseB").value)
            });
        }

        const planetC = document.getElementById("planetC").value;
        if (planetC) {
            conditions.push({
                planet: planetC,
                house: parseInt(document.getElementById("houseC").value)
            });
        }

        const payload = {
            birth_year: year,
            birth_month: month,
            birth_day: day,
            birth_hour_utc: birthHourUTC,
            house_conditions: conditions,
            resolution: 1.5,
            aspect_overlay: {
                planet: document.getElementById("overlayPlanet").value,
                aspect: document.getElementById("overlayAspect").value,
                angle: document.getElementById("overlayAngle").value
            }
        };

        const response = await fetch(
            "http://127.0.0.1:8000/search-regions",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            }
        );

        const data = await response.json();

        if (token !== currentRenderToken) return;

        data.features.forEach(feature => {
            if (feature.properties.angle) {
                L.geoJSON(feature, {
                    pointToLayer: function(feature, latlng) {
                        return L.circleMarker(latlng, {
                            radius: feature.properties.radius || 4,
                            color: feature.properties.color || "#00e5ff",
                            fillColor: feature.properties.color || "#00e5ff",
                            fillOpacity: 1,
                            weight: 2
                        });
                    },
                    style: function(feature) {
                        return {
                            color: feature.properties.color || "#00e5ff",
                            weight: 2,
                            opacity: 1,
                            lineCap: "round"
                        };
                    }
                }).addTo(aspectLayer);
            } else {
                let idx = feature.properties.condition_index || 0;

                L.geoJSON(feature, {
                    style: {
                        fillColor: colors[idx],
                        fillOpacity: 0.35,
                        stroke: false,
                        opacity: 0,
                        weight: 0
                    }
                }).addTo(polygonLayer);
            }
        });

        console.log("COMPLETE RENDER", token);
        renderCities();

    } catch (err) {
        console.error(err);
    } finally {
        document.getElementById("findBtn").disabled = false;
    }
}

document.getElementById("findBtn").onclick = function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        findRegions();
    }, 400);
};
document.getElementById("citySearch").addEventListener("keydown", function(e) {
    if (e.key !== "Enter") return;

    const q = this.value.trim().toLowerCase();
    if (!q) return;

    const match = citiesData.find(city =>
        city.name.toLowerCase().includes(q)
    );

    if (!match) {
        alert("City not found");
        return;
    }

    map.setView([match.lat, match.lng], 7);

    L.popup()
        .setLatLng([match.lat, match.lng])
        .setContent(`
            <b>${match.name}, ${match.country}</b><br>
            ${match.lat.toFixed(2)}°, ${match.lng.toFixed(2)}°
        `)
        .openOn(map);
});
document.getElementById("citySearch").addEventListener("keydown", function(e) {
    if (e.key !== "Enter") return;

    const q = this.value.trim().toLowerCase();
    if (!q) return;

    const match = citiesData.find(city =>
        city.name.toLowerCase().includes(q)
    );

    if (!match) {
        alert("City not found");
        return;
    }

    map.setView([match.lat, match.lng], 7);

    L.popup()
        .setLatLng([match.lat, match.lng])
        .setContent(`
            <b>${match.name}, ${match.country}</b><br>
            ${match.lat.toFixed(2)}°, ${match.lng.toFixed(2)}°
        `)
        .openOn(map);
});
// Cities already loaded from cities.js
if (typeof citiesData !== 'undefined') {
    console.log("Cities loaded:", citiesData.length);
    renderCities();
}
</script>

</body>
